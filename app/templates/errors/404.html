{% extends "base.html" %}

{% block content %}
<div class="error-page">
    <div class="error-content">
        <h1>404 - 页面未找到</h1>
        <div class="error-icon">🔍</div>
        <p class="error-message">抱歉，您要查找的页面不存在。</p>
        <p class="error-description">可能是网址输入错误，或者页面已被移动或删除。</p>
        
        <div class="error-actions">
            <a href="{{ url_for('main.index') }}" class="btn btn-primary">返回首页</a>
            <button onclick="history.back()" class="btn btn-secondary">返回上页</button>
        </div>
    </div>
</div>

<style>
.error-page {
    text-align: center;
    padding: 4rem 2rem;
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.error-content h1 {
    color: #333;
    margin-bottom: 1rem;
    font-size: 2.5rem;
}

.error-icon {
    font-size: 4rem;
    margin: 2rem 0;
}

.error-message {
    font-size: 1.2rem;
    color: #666;
    margin-bottom: 0.5rem;
}

.error-description {
    color: #888;
    margin-bottom: 2rem;
}

.error-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
}

.btn {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    text-decoration: none;
    border-radius: 4px;
    font-weight: 500;
    transition: all 0.3s ease;
}

.btn-primary {
    background-color: #007bff;
    color: white;
    border: none;
}

.btn-primary:hover {
    background-color: #0056b3;
}

.btn-secondary {
    background-color: #6c757d;
    color: white;
    border: none;
    cursor: pointer;
}

.btn-secondary:hover {
    background-color: #545b62;
}

@media (max-width: 768px) {
    .error-content h1 {
        font-size: 2rem;
    }
    
    .error-actions {
        flex-direction: column;
        align-items: center;
    }
    
    .btn {
        width: 200px;
    }
}
</style>
{% endblock %}
