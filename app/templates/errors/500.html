{% extends "base.html" %}

{% block content %}
<div class="error-page">
    <div class="error-content">
        <h1>500 - 服务器错误</h1>
        <div class="error-icon">⚠️</div>
        <p class="error-message">抱歉，服务器遇到了意外错误。</p>
        <p class="error-description">我们的技术团队已收到通知，正在处理此问题。</p>
        
        <div class="error-help">
            <p>您可以尝试：</p>
            <ul>
                <li>稍后重试</li>
                <li>返回首页重新开始</li>
                <li>如果问题持续存在，请联系管理员</li>
            </ul>
        </div>
        
        <div class="error-actions">
            <a href="{{ url_for('main.index') }}" class="btn btn-primary">返回首页</a>
            <button onclick="location.reload()" class="btn btn-secondary">重新加载</button>
        </div>
    </div>
</div>

<style>
.error-page {
    text-align: center;
    padding: 4rem 2rem;
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.error-content h1 {
    color: #dc3545;
    margin-bottom: 1rem;
    font-size: 2.5rem;
}

.error-icon {
    font-size: 4rem;
    margin: 2rem 0;
}

.error-message {
    font-size: 1.2rem;
    color: #666;
    margin-bottom: 0.5rem;
}

.error-description {
    color: #888;
    margin-bottom: 2rem;
}

.error-help {
    background-color: #f8f9fa;
    padding: 1.5rem;
    border-radius: 8px;
    margin: 2rem 0;
    text-align: left;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
}

.error-help p {
    font-weight: bold;
    margin-bottom: 0.5rem;
    color: #495057;
}

.error-help ul {
    list-style-type: none;
    padding-left: 0;
}

.error-help li {
    padding: 0.25rem 0;
    color: #6c757d;
    position: relative;
    padding-left: 1.5rem;
}

.error-help li:before {
    content: "•";
    color: #007bff;
    position: absolute;
    left: 0.5rem;
}

.error-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
}

.btn {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    text-decoration: none;
    border-radius: 4px;
    font-weight: 500;
    transition: all 0.3s ease;
}

.btn-primary {
    background-color: #007bff;
    color: white;
    border: none;
}

.btn-primary:hover {
    background-color: #0056b3;
}

.btn-secondary {
    background-color: #6c757d;
    color: white;
    border: none;
    cursor: pointer;
}

.btn-secondary:hover {
    background-color: #545b62;
}

@media (max-width: 768px) {
    .error-content h1 {
        font-size: 2rem;
    }
    
    .error-actions {
        flex-direction: column;
        align-items: center;
    }
    
    .btn {
        width: 200px;
    }
}
</style>
{% endblock %}
